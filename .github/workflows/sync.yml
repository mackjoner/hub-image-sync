name: Sync Images to Harbor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: hhyasdf/image-sync-action@v1.1
        with:
          auth_file: ./auth.yaml
          images_file: ./images.yaml
          proc: 10
          retries: 3
        env:
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
