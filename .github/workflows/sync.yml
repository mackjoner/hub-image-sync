name: Sync Images to Harbor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | skopeo login harbor.aiwa.top \
            --username 'robot$clouddao_bot' \
            --password-stdin \
            --tls-verify=false

      - name: Sync images
        run: |
          python3 - <<'EOF'
          import yaml, subprocess, sys

          with open("images.yaml") as f:
              images = yaml.safe_load(f)

          failed = []
          for src, dst in images.items():
              print(f"Syncing: {src} -> {dst}")
              result = subprocess.run([
                  "skopeo", "copy",
                  "--override-os", "linux",
                  "--override-arch", "amd64",
                  "--dest-tls-verify=false",
                  f"docker://{src}",
                  f"docker://{dst}",
              ])
              if result.returncode != 0:
                  print(f"FAILED: {src}")
                  failed.append(src)

          if failed:
              print(f"\nFailed images: {failed}")
              sys.exit(1)
          EOF
